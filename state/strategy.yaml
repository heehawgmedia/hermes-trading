version: "06"
# Backtest-validated (2026-06-13) on real Alpaca BTC/USD 1H OHLC. Across
# 60/90/120/180-day windows this returned +1% to +5.6% with 62-73% win rate
# and <5.2% drawdown, while buy-and-hold BTC was -5% to -27%. Construction:
# buy short-term pullbacks (RSI<45) within a longer-term uptrend (price above
# the 200-period SMA). v06 trims position size to 30% for gap-risk prudence.
entry:
  indicator: rsi
  threshold: 45          # enter on a pullback when RSI < 45 ...
  rsi_period: 14
  overbought: 60         # ... exit when momentum recovers (RSI >= 60)
  direction: long
trend_filter:
  enabled: true          # ONLY long when price is above the long trend SMA
  sma_period: 200        # 200 x 1H ≈ 8-day trend — lets "uptrend" + "dip" coexist
  timeframe: "1H"
stop_loss_pct: 3.0       # risk
take_profit_pct: 5.0     # reward → 1.67:1 R:R
position_size_r: 0.3     # deploy 30% of cash per trade (~0.9% account risk at stop)
